{% extends 'base.html' %}
{% block title %}דוחות מועדון{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>דוחות</h1>
        <p class="subtitle">בחר תאריכים לצפייה בנתוני השחקנים של המועדון</p>
    </div>
    <div style="display:flex; gap:0.4rem; flex-wrap:wrap;">
        <button onclick="exportPeriod()" class="btn btn-outline btn-sm">📥 הורד דוח תקופה</button>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline">← חזור</a>
    </div>
</div>

<div class="section" style="margin-bottom:1.5rem;">
    <div style="display:flex; gap:1.5rem; flex-wrap:wrap; align-items:flex-start;">

        {# Calendar #}
        <div style="min-width:280px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                <button onclick="changeMonth(-1)" class="btn btn-outline btn-sm">→</button>
                <strong id="calMonthLabel" style="font-size:1rem;"></strong>
                <button onclick="changeMonth(1)" class="btn btn-outline btn-sm">←</button>
            </div>
            <div id="calendar" style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center;"></div>
        </div>

        {# Filters #}
        <div style="flex:1; min-width:250px;">
            <div style="display:flex; gap:0.5rem; margin-bottom:0.8rem; flex-wrap:wrap;">
                <div>
                    <label class="muted small" style="display:block; margin-bottom:0.2rem;">תקופה</label>
                    <select id="periodSelect" onchange="onPeriodChange()" style="padding:0.4rem 0.6rem; border:1px solid #ddd; border-radius:6px; font-family:inherit; max-width:200px;">
                        <option value="" id="currentPeriodOption">תקופה נוכחית</option>
                    </select>
                </div>
                <div>
                    <label class="muted small" style="display:block; margin-bottom:0.2rem;">מתאריך</label>
                    <input type="date" id="fromDate" style="padding:0.4rem 0.6rem; border:1px solid #ddd; border-radius:6px; font-family:inherit;">
                </div>
                <div>
                    <label class="muted small" style="display:block; margin-bottom:0.2rem;">עד תאריך</label>
                    <input type="date" id="toDate" style="padding:0.4rem 0.6rem; border:1px solid #ddd; border-radius:6px; font-family:inherit;">
                </div>
                <div>
                    <label class="muted small" style="display:block; margin-bottom:0.2rem;">שחקן</label>
                    <select id="playerFilter" style="padding:0.4rem 0.6rem; border:1px solid #ddd; border-radius:6px; font-family:inherit; max-width:200px;">
                        <option value="">כל השחקנים</option>
                        {% for p in players %}
                        <option value="{{ p.player_id }}">{{ p.nickname }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <button onclick="loadReport()" class="btn btn-primary">הצג דוח</button>
            <span id="reportInfo" class="muted small" style="margin-right:0.5rem;"></span>
        </div>
    </div>
</div>

<div id="summaryCards" style="display:none;" class="stats-grid stats-4">
    <div class="stat-card">
        <div class="stat-label">ימים</div>
        <div class="stat-value" id="sumDays">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">שחקנים</div>
        <div class="stat-value" id="sumPlayers">0</div>
    </div>
    <div class="stat-card income">
        <div class="stat-label">Rake</div>
        <div class="stat-value" id="sumRake">0</div>
    </div>
    <div class="stat-card" id="sumPnlCard">
        <div class="stat-label">רווח/הפסד</div>
        <div class="stat-value" id="sumPnl">0</div>
    </div>
</div>

<div id="exportBar" style="display:none; margin-top:1rem; margin-bottom:0.5rem; text-align:center;">
    <button onclick="exportResult()" style="background:linear-gradient(135deg,#217346,#1a5c38); color:#fff; border:none; border-radius:10px; padding:0.6rem 1.5rem; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:inherit; box-shadow:0 3px 12px rgba(33,115,70,0.3); transition:all 0.2s;">📥 הורד לאקסל</button>
</div>

<div class="section" id="reportResults" style="display:none; margin-top:0.5rem;">
    <h2 class="section-title" id="reportTitle">תוצאות</h2>
    <div class="table-scroll-wrap">
        <table class="table table-sm">
            <thead>
                <tr><th>#</th><th>שחקן</th><th>קלאב</th><th>Hands</th><th>Rake</th><th>רווח/הפסד</th></tr>
            </thead>
            <tbody id="reportBody"></tbody>
        </table>
    </div>
</div>

<style>
.cal-day { padding:0.4rem 0.2rem; border-radius:6px; font-size:0.82rem; cursor:pointer; transition:all 0.15s; }
.cal-day:hover { background:#e0e4ef; }
.cal-day.has-data { background:#eef0ff; color:#4361ee; font-weight:600; }
.cal-day.selected { background:#4361ee; color:#fff; }
.cal-day.in-range { background:#c8d4ff; color:#1a1a2e; }
.cal-day.empty { cursor:default; }
.cal-day.empty:hover { background:transparent; }
.cal-header { font-size:0.7rem; color:#888; font-weight:600; padding:0.3rem 0; }
body.dark .cal-day:hover { background:#333; }
body.dark .cal-day.has-data { background:#252545; color:#7b8cff; }
body.dark .cal-day.selected { background:#4361ee; color:#fff; }
body.dark .cal-day.in-range { background:#333355; color:#ddd; }
.table-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
</style>

<script>
var dataDates = [];
var calYear, calMonth;
var selectedFrom = null, selectedTo = null;
var myPlayerIds = {{ player_ids|tojson }};
var currentPeriodId = '';

fetch('/api/report-dates').then(r => r.json()).then(d => {
    dataDates = d.dates;
    var now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
    var sel = document.getElementById('periodSelect');
    if (d.current_label) {
        document.getElementById('currentPeriodOption').textContent = 'תקופה נוכחית (' + d.current_label + ')';
    }
    (d.periods || []).forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.label;
        sel.appendChild(opt);
    });
    renderCalendar();
});
function onPeriodChange() {
    currentPeriodId = document.getElementById('periodSelect').value;
    selectedFrom = null; selectedTo = null;
    document.getElementById('fromDate').value = '';
    document.getElementById('toDate').value = '';
    var url = '/api/report-dates';
    if (currentPeriodId) url += '?period_id=' + currentPeriodId;
    fetch(url).then(r => r.json()).then(d => {
        dataDates = d.dates;
        if (dataDates.length > 0) {
            var first = new Date(dataDates[0]);
            calYear = first.getFullYear();
            calMonth = first.getMonth();
        }
        renderCalendar();
    });
}

function renderCalendar() {
    var cal = document.getElementById('calendar');
    var label = document.getElementById('calMonthLabel');
    var months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
    label.textContent = months[calMonth] + ' ' + calYear;
    var days = ['א','ב','ג','ד','ה','ו','ש'];
    var html = '';
    days.forEach(d => { html += '<div class="cal-header">' + d + '</div>'; });
    var first = new Date(calYear, calMonth, 1);
    var lastDay = new Date(calYear, calMonth + 1, 0).getDate();
    var startDay = first.getDay();
    for (var i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
    for (var d = 1; d <= lastDay; d++) {
        var dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var hasData = dataDates.indexOf(dateStr) >= 0;
        var isSelected = (selectedFrom === dateStr || selectedTo === dateStr);
        var inRange = false;
        if (selectedFrom && selectedTo) inRange = dateStr >= selectedFrom && dateStr <= selectedTo;
        var cls = 'cal-day';
        if (hasData) cls += ' has-data';
        if (isSelected) cls += ' selected';
        else if (inRange) cls += ' in-range';
        html += '<div class="' + cls + '" onclick="selectDate(\'' + dateStr + '\')">' + d + '</div>';
    }
    cal.innerHTML = html;
}
function changeMonth(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
}
function selectDate(dateStr) {
    if (!selectedFrom || (selectedFrom && selectedTo)) { selectedFrom = dateStr; selectedTo = null; }
    else { if (dateStr < selectedFrom) { selectedTo = selectedFrom; selectedFrom = dateStr; } else { selectedTo = dateStr; } }
    document.getElementById('fromDate').value = selectedFrom || '';
    document.getElementById('toDate').value = selectedTo || selectedFrom || '';
    renderCalendar();
}
function exportPeriod() {
    var from = document.getElementById('fromDate').value;
    var to = document.getElementById('toDate').value;
    if (!from || !to) { alert('יש לבחור תאריכים'); return; }
    var pid = document.getElementById('playerFilter').value;
    var url = '/export/club/period?from=' + from + '&to=' + to;
    if (pid) url += '&player_id=' + pid;
    if (currentPeriodId) url += '&period_id=' + currentPeriodId;
    window.location.href = url;
}
function exportResult() {
    var from = document.getElementById('fromDate').value;
    var to = document.getElementById('toDate').value;
    if (!from || !to) { alert('יש לבחור תאריכים'); return; }
    var pid = document.getElementById('playerFilter').value;
    var url = '/export/club/period?from=' + from + '&to=' + to;
    if (pid) url += '&player_id=' + pid;
    if (currentPeriodId) url += '&period_id=' + currentPeriodId;
    window.location.href = url;
}
function loadReport() {
    var from = document.getElementById('fromDate').value;
    var to = document.getElementById('toDate').value;
    var pid = document.getElementById('playerFilter').value;
    if (!from || !to) { alert('יש לבחור תאריכים'); return; }
    selectedFrom = from; selectedTo = to; renderCalendar();
    var url = '/api/report?from=' + from + '&to=' + to;
    if (pid) url += '&player_id=' + pid;
    if (currentPeriodId) url += '&period_id=' + currentPeriodId;
    document.getElementById('reportInfo').textContent = 'טוען...';
    fetch(url).then(r => r.json()).then(data => {
        // Filter only club players
        var filtered = data.players.filter(p => myPlayerIds.indexOf(p.player_id) >= 0);
        var totals = {pnl:0, rake:0, hands:0};
        filtered.forEach(p => { totals.pnl += p.pnl; totals.rake += p.rake; totals.hands += p.hands; });
        document.getElementById('summaryCards').style.display = 'grid';
        document.getElementById('exportBar').style.display = 'block';
        document.getElementById('reportResults').style.display = 'block';
        document.getElementById('sumDays').textContent = data.days;
        document.getElementById('sumPlayers').textContent = filtered.length;
        document.getElementById('sumRake').textContent = totals.rake.toFixed(2);
        document.getElementById('sumPnl').textContent = (totals.pnl > 0 ? '+' : '') + totals.pnl.toFixed(2);
        document.getElementById('sumPnlCard').className = 'stat-card ' + (totals.pnl >= 0 ? 'income' : 'expense');
        document.getElementById('reportTitle').textContent = 'תוצאות (' + filtered.length + ' שחקנים)';
        document.getElementById('reportInfo').textContent = '';
        var html = '';
        filtered.forEach(function(p, i) {
            var cls = p.pnl >= 0 ? 'income' : 'expense';
            var sign = p.pnl > 0 ? '+' : '';
            html += '<tr><td>' + (i+1) + '</td><td><strong>' + p.nickname + '</strong></td><td class="muted">' + p.club + '</td>';
            html += '<td>' + p.hands.toLocaleString() + '</td><td class="amount income">' + p.rake.toFixed(2) + '</td>';
            html += '<td class="amount ' + cls + '">' + sign + p.pnl.toFixed(2) + '</td></tr>';
        });
        document.getElementById('reportBody').innerHTML = html;
    });
}
</script>
{% endblock %}
