{% extends 'base.html' %}
{% block title %}הוסף עסקה - ניהול כספים{% endblock %}

{% block content %}
<div class="page-header">
    <h1>הוסף עסקה</h1>
    <a href="{{ url_for('main.transactions') }}" class="btn btn-outline">חזור</a>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('main.add_transaction') }}" id="txForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label>סוג עסקה</label>
            <div class="type-toggle">
                <input type="radio" id="type_expense" name="type" value="expense" checked>
                <label for="type_expense" class="type-label expense-label">הוצאה</label>
                <input type="radio" id="type_income" name="type" value="income">
                <label for="type_income" class="type-label income-label">הכנסה</label>
            </div>
        </div>

        <div class="form-group">
            <label for="amount">סכום (₪)</label>
            <input type="number" id="amount" name="amount" required min="0.01" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group" id="category-group">
            <label for="category">קטגוריה</label>
            <select id="category" name="category" required>
                <option value="">בחר קטגוריה</option>
            </select>
        </div>

        <div class="form-group">
            <label for="description">תיאור (אופציונלי)</label>
            <input type="text" id="description" name="description" placeholder="תיאור קצר...">
        </div>

        <div class="form-group">
            <label for="date">תאריך</label>
            <input type="date" id="date" name="date" value="{{ today }}" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full">שמור עסקה</button>
    </form>
</div>

<script>
const incomeCategories = {{ income_categories | tojson }};
const expenseCategories = {{ expense_categories | tojson }};

function updateCategories() {
    const type = document.querySelector('input[name="type"]:checked').value;
    const select = document.getElementById('category');
    const cats = type === 'income' ? incomeCategories : expenseCategories;
    select.innerHTML = '<option value="">בחר קטגוריה</option>';
    cats.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
    });
}

document.querySelectorAll('input[name="type"]').forEach(r => r.addEventListener('change', updateCategories));
updateCategories();
</script>
{% endblock %}
